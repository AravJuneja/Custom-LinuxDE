[colors]
background = #ffffd7
background-alt = #dcd6c5
foreground = #1c1c1c
primary = #3a6ea5
secondary = #a14f3b
alert = #d99a00
disabled = #9a9a9a

[bar/example]
width = 100%
height = 17pt
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 0pt
border-color = rgba(255, 255, 255, 1.0)

padding-left = 0
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace:size=7;2
font-1 = FontAwesome:style=Regular:size=9

modules-left = xworkspaces
modules-center = time
modules-right = bluetooth_gui backlight pulseaudio battery_power battery_watts date systray powermenu

[module/systray]
type = internal/tray
tray-spacing = 10
format-margin = 2

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}
click-left = ~/.config/polybar/volume_unmute_zero.sh

ramp-volume-0 = [░░░░░]
ramp-volume-1 = [█░░░░]
ramp-volume-2 = [██░░░]
ramp-volume-3 = [███░░]
ramp-volume-4 = [████░]
ramp-volume-5 = [█████]
ramp-volume-foreground = ${colors.primary}

[module/battery_power]
type = custom/script
exec = ~/.config/polybar/battery.sh
interval = 1

[module/battery_watts]
type = custom/script
exec = ~/.config/polybar/watts.sh
interval = 10
label = ⚡ %output%

[module/bluetooth_gui]
type = custom/text
content = %{T2}%{T-}
click-left = blueman-manager
label-foreground = ${colors.primary}

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
label = %date%
label-foreground = ${colors.primary}

[module/time]
type = internal/date
interval = 1
time = %I:%M:%S %p
label = %time%
label-foreground = ${colors.foreground}

[module/powermenu]
type = custom/menu

expand-right = true
format-spacing = 0

label-open = %{T2}%{T-}
label-open-foreground = ${colors.primary}
label-close = %{T2}%{T-}
label-close-foreground = ${colors.secondary}

label-separator = "|"
label-separator-foreground = ${colors.disabled}

menu-0-0 = %{T2} Power Off%{T-}
menu-0-0-exec = systemctl poweroff
menu-0-1 = %{T2} Log Out%{T-}
menu-0-1-exec = i3-msg exit

[module/backlight]
type = internal/backlight
card = intel_backlight
format =   <label>
label = %percentage%%

[settings]
screenchange-reload = true
pseudo-transparency = false
